name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build portable app
        shell: pwsh
        run: .\tools\build_windows_app.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME.TrimStart("v")
          } else {
            $version = "dev-$env:GITHUB_RUN_NUMBER"
          }

          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc /DMyAppVersion="$version" packaging\inno\LagrangeStarHunter.iss

          $versionedInstaller = Get-ChildItem dist\installer\LagrangeStarHunterSetup-*.exe | Select-Object -First 1
          Copy-Item -LiteralPath $versionedInstaller.FullName -Destination dist\installer\LagrangeStarHunterSetup.exe -Force

      - name: Show installer output
        shell: pwsh
        run: Get-ChildItem dist\installer -Force

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LagrangeStarHunterSetup
          path: dist/installer/*.exe

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Lagrange Star Hunter ${{ github.ref_name }}
          files: dist/installer/*.exe
          body: |
            下载 LagrangeStarHunterSetup 安装器后，按提示点击 Next/下一步安装即可。

            安装完成后，可以从桌面快捷方式或开始菜单启动“拉格朗日星际猎人自动化面板”。
